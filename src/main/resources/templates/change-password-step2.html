<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clearance Verification | Safeguard Heritage</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="auth-body">
    <div class="auth-container">
        <div class="auth-card fade-in">
            <div class="step-indicator">
                <div class="step-dot active"></div>
                <div class="step-line" style="background: var(--gold);"></div>
                <div class="step-dot active"></div>
                <div class="step-line"></div>
                <div class="step-dot"></div>
            </div>

            <div class="auth-header">
                <p style="letter-spacing: 0.2em; margin-bottom: 20px; font-size: 11px;">RECOVERY PROTOCOL — STEP 2</p>
                <h1>Clearance Authorization</h1>
                <p>Submit the recovery code sent to your registered communication channel.</p>
            </div>

            <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

            <form th:action="@{/change-password/step2}" method="post">
                <div class="form-group">
                    <label class="form-label">Recovery Code (OTP)</label>
                    <input type="text" name="otp" required autofocus class="form-control" placeholder="6-Digit Code" style="text-align: center; letter-spacing: 0.5em; font-size: 24px;">
                </div>

                <div style="margin-top: 40px;">
                    <button type="submit" class="btn btn-primary" style="width: 100%;">Authorize Clearance</button>
                    <div style="text-align: center; margin-top: 32px;">
                        <a th:href="@{/login}" class="auth-link" style="font-size: 13px; opacity: 0.8;">Cancel Recovery</a>
                    </div>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
