<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Protocol Finalization | Safeguard Heritage</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="auth-body">
    <div class="auth-container">
        <div class="auth-card fade-in">
            <div class="step-indicator">
                <div class="step-dot active"></div>
                <div class="step-line" style="background: var(--gold);"></div>
                <div class="step-dot active"></div>
                <div class="step-line" style="background: var(--gold);"></div>
                <div class="step-dot active"></div>
            </div>

            <div class="auth-header">
                <p style="letter-spacing: 0.2em; margin-bottom: 20px; font-size: 11px;">RECOVERY PROTOCOL — STEP 3</p>
                <h1>Finalize Passphrase</h1>
                <p>Establish a new secure passphrase for your heritage portfolio.</p>
            </div>

            <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

            <form th:action="@{/change-password/step3}" method="post">
                <div class="form-group">
                    <label class="form-label">New Secure Passphrase</label>
                    <input type="password" name="newPassword" required autofocus class="form-control" placeholder="••••••••">
                </div>
                <div class="form-group">
                    <label class="form-label">Confirm Passphrase</label>
                    <input type="password" name="confirmPassword" required class="form-control" placeholder="••••••••">
                </div>

                <div style="margin-top: 40px;">
                    <button type="submit" class="btn btn-primary" style="width: 100%;">Establish New Protocol</button>
                    <div style="text-align: center; margin-top: 32px;">
                        <span style="font-size: 13px; opacity: 0.8; color: var(--text-secondary);">Identity is verified and secured.</span>
                    </div>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
