<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Request Vault Access | Safeguard Heritage</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div class="dashboard-wrapper">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="sidebar-logo">SAFEGUARD</div>
            <nav class="sidebar-nav">
                <a th:href="@{/customer/dashboard}" class="nav-link">Private View</a>
                <a th:href="@{/customer/request-access}" class="nav-link active">Secure Visit</a>
                <a th:href="@{/customer/report}" class="nav-link">Portfolio View</a>
            </nav>
            <div class="sidebar-footer">
                <form th:action="@{/logout}" method="post">
                    <button type="submit" class="btn btn-outline" style="width:100%;border:none;padding-left:0;">Sign Out</button>
                </form>
            </div>
        </div>

        <!-- Main Content -->
        <div class="main-content fade-in">
            <header class="top-bar">
                <div class="breadcrumb" style="font-size:11px;letter-spacing:0.1em;color:var(--gold);">
                    PRIVATE CLIENT / <span style="color:var(--text);">SECURE VISIT</span>
                </div>
            </header>

            <main class="content-body">
                <div class="page-header" style="justify-content: center; text-align: center;">
                    <div>
                        <h2>Request Vault Access</h2>
                        <p style="color:var(--text-secondary);font-size:12px;letter-spacing:0.1em;text-transform:uppercase;">Schedule a formal visit to your secured vault.</p>
                    </div>
                </div>

                <div th:if="${error}" class="alert alert-error" th:text="${error}" style="margin-bottom:32px;"></div>

                <div class="auth-container" style="max-width:600px; margin: 0 auto;">
                    <div class="auth-card" style="text-align:left;padding:60px;">
                        <h3 style="font-size:14px;color:var(--gold);margin-bottom:40px;letter-spacing:0.1em;text-transform:uppercase;">VISIT DETAILS</h3>

                        <form th:action="@{/customer/request-access}" method="post">
                            <div class="form-group">
                                <label class="form-label">Select Vault</label>
                                <select name="lockerId" class="form-control" required>
                                    <option value="" disabled selected>Choose your vault</option>
                                    <option th:each="locker : ${lockers}" th:value="${locker.id}" th:text="|${locker.lockerNumber} — ${locker.branch}|"></option>
                                </select>
                                <p th:if="${#lists.isEmpty(lockers)}" style="font-size:12px;color:var(--error);margin-top:8px;">You have no assigned vaults. Please petition for allocation first.</p>
                            </div>

                            <div class="form-group">
                                <label class="form-label">Preferred Date</label>
                                <input type="date" name="date" class="form-control" required>
                            </div>

                            <div class="form-group">
                                <label class="form-label">Preferred Time Slot</label>
                                <select name="timeSlot" class="form-control" required>
                                    <option value="09:00 - 11:00">Morning — 09:00 to 11:00</option>
                                    <option value="11:00 - 13:00">Late Morning — 11:00 to 13:00</option>
                                    <option value="14:00 - 16:00">Afternoon — 14:00 to 16:00</option>
                                    <option value="16:00 - 18:00">Late Afternoon — 16:00 to 18:00</option>
                                </select>
                            </div>

                            <div class="form-group">
                                <label class="form-label">Purpose of Visit</label>
                                <textarea name="purpose" class="form-control" rows="3" placeholder="Briefly state the purpose of your visit..." required style="resize:vertical;"></textarea>
                            </div>

                            <div style="margin-top:40px;">
                                <button type="submit" class="btn btn-primary" style="width:100%;" th:disabled="${#lists.isEmpty(lockers)}">Submit Visit Request</button>
                                <div style="text-align:center;margin-top:24px;">
                                    <a th:href="@{/customer/dashboard}" class="auth-link" style="font-size:13px;opacity:0.8;">Return to Portfolio</a>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>
            </main>
        </div>
    </div>
</body>
</html>
